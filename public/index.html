<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Downloader</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #eef2f3; color: #333; }
        .box { max-width: 450px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 95%; }
        button:disabled { background: #bdc3c7; }
        #msg { margin-top: 20px; color: #7f8c8d; font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Tải File Drive Bị Chặn</h2>
        <input type="text" id="link" placeholder="Dán link Google Drive vào đây...">
        <button id="btn" onclick="download()">BẮT ĐẦU TẢI</button>
        <div id="msg"></div>
    </div>
    <script>
        async function download() {
            const url = document.getElementById('link').value;
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            if(!url) return alert('Vui lòng nhập link!');
            
            btn.disabled = true;
            msg.innerHTML = "<b>Hệ thống đang xử lý ngầm:</b><br>1. Khởi động trình duyệt ảo.<br>2. Cuộn trang lấy ảnh nét.<br>3. Tiến hành gộp PDF...<br>(Quá trình này mất khoảng 10-30 giây tùy số trang)";

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ driveUrl: url })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Tải thất bại');
                }
                const blob = await res.blob();
                const dUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = dUrl;
                a.download = "tailieu_drive.pdf";
                document.body.appendChild(a);
                a.click();
                a.remove();
                msg.innerHTML = "<span style='color: #27ae60;'><b>Thành công!</b> File đã được tải về máy của bạn.</span>";
            } catch (err) {
                msg.innerHTML = "<span style='color: #c0392b;'><b>Lỗi:</b> " + err.message + "</span>";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
